<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NC Courage 2026 — Match Battles Report</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --courage-red: #C8102E;
    --courage-navy: #13264B;
    --courage-gold: #D4AF37;
    --bg-dark: #F2F0EB;
    --bg-card: #FFFFFF;
    --bg-surface: #EAE8E3;
    --bg-elevated: #E2DFD9;
    --text-primary: #1A1A18;
    --text-secondary: #4A4A45;
    --text-muted: #7A7A74;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.15);
    --win: #2E9E5B;
    --win-soft: #E4F3EA;
    --draw: #B5A24A;
    --draw-soft: #F3EFDE;
    --loss: #C0392B;
    --loss-soft: #F7E6E3;
    --opp-bar: #4A5A78;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-dark); color: var(--text-primary); font-family: 'Barlow', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }

  .header { background: var(--courage-navy); border-bottom: 3px solid var(--courage-red); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
  .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: white; }
  .header-subtitle { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 1px; }
  .header-meta { text-align: right; font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 0.08em; text-transform: uppercase; }

  .match-bar { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; gap: 8px; height: 56px; }
  .match-bar-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; margin-right: 8px; }
  .match-bar-scroll { display: flex; align-items: center; gap: 7px; overflow-x: auto; flex: 1; scrollbar-width: none; padding: 4px 0; }
  .match-bar-scroll::-webkit-scrollbar { display: none; }
  .match-pill { background: transparent; border: 1px solid var(--border-strong); border-radius: 4px; padding: 5px 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all 0.15s; display: flex; flex-direction: column; align-items: flex-start; gap: 1px; line-height: 1.25; }
  .match-pill .mp-top { display: flex; align-items: center; gap: 6px; }
  .match-pill .mp-res { font-size: 10px; font-weight: 700; width: 15px; height: 15px; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; color: #fff; }
  .mp-res.W, .seg.win, .chip.win { background: var(--win); }
  .mp-res.D, .seg.draw, .chip.draw { background: var(--draw); }
  .mp-res.L, .seg.loss, .chip.loss { background: var(--loss); }
  .match-pill .mp-opp { font-size: 10px; color: var(--text-muted); font-weight: 400; }
  .match-pill:hover { border-color: var(--courage-red); color: var(--text-primary); }
  .match-pill.active { background: var(--courage-navy); border-color: var(--courage-navy); color: #fff; }
  .match-pill.active .mp-opp { color: rgba(255,255,255,0.6); }
  .view-toggle { margin-left: auto; flex-shrink: 0; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--courage-gold); font-weight: 600; cursor: pointer; border: 1px solid rgba(212,175,55,0.4); border-radius: 4px; padding: 7px 14px; white-space: nowrap; background: transparent; transition: all 0.15s; }
  .view-toggle:hover, .view-toggle.active { background: var(--courage-gold); color: #1A1A18; }

  .main { padding: 24px 32px; max-width: 1280px; }

  /* SCOREBOARD HERO */
  .hero { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; margin-bottom: 22px; display: grid; grid-template-columns: auto 1fr auto; gap: 28px; align-items: center; }
  .hero-left { text-align: center; border-right: 1px solid var(--border); padding-right: 28px; }
  .hero-wonbig { font-family: 'Barlow Condensed', sans-serif; font-size: 64px; font-weight: 700; line-height: 0.9; color: var(--courage-navy); }
  .hero-wonbig small { font-size: 22px; color: var(--text-muted); font-weight: 600; }
  .hero-wonlabel { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }
  .hero-wdl { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
  .hero-wdl div { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; }
  .hero-wdl .w { color: var(--win); } .hero-wdl .d { color: var(--draw); } .hero-wdl .l { color: var(--loss); }
  .hero-mid { display: flex; flex-direction: column; gap: 12px; }
  .hero-seg { display: flex; height: 16px; border-radius: 4px; overflow: hidden; background: var(--bg-surface); }
  .hero-seg .seg { height: 100%; display: flex; align-items: center; justify-content: center; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; transition: width 0.4s ease; }
  .hero-narrative { font-size: 13.5px; line-height: 1.55; color: var(--text-secondary); }
  .hero-narrative strong { color: var(--courage-navy); font-weight: 600; }
  .hero-right { text-align: right; padding-left: 24px; border-left: 1px solid var(--border); }
  .hero-matchup { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
  .hero-score { font-family: 'Barlow Condensed', sans-serif; font-size: 40px; font-weight: 700; line-height: 1; margin: 4px 0; }
  .hero-resbadge { display: inline-block; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 12px; border-radius: 3px; color: #fff; }
  .hero-resbadge.W { background: var(--win); } .hero-resbadge.D { background: var(--draw); } .hero-resbadge.L { background: var(--loss); }
  .hero-date { font-size: 11px; color: var(--text-muted); margin-top: 6px; letter-spacing: 0.04em; }

  /* PHASE GROUPS */
  .phase { margin-bottom: 22px; }
  .phase-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .phase-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--courage-navy); }
  .phase-tally { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; color: var(--text-muted); }
  .phase-tally b { color: var(--win); } .phase-line { flex: 1; height: 1px; background: var(--border); }

  .battle-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .battle-cols { display: grid; grid-template-columns: 200px 1fr 86px; align-items: center; padding: 6px 18px; font-family: 'Barlow Condensed', sans-serif; font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); background: var(--bg-surface); }
  .battle-cols .bc-mid { display: grid; grid-template-columns: 54px 1fr 54px; gap: 10px; align-items: center; }
  .battle-cols .bc-ncc { text-align: right; color: var(--courage-red); } .battle-cols .bc-opp { text-align: left; }
  .battle-cols .bc-bar { text-align: center; }
  .battle-cols .bc-res { text-align: center; }

  .brow { display: grid; grid-template-columns: 200px 1fr 86px; align-items: center; padding: 11px 18px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .brow:last-child { border-bottom: none; }
  .brow:hover { background: var(--bg-surface); }
  .brow-label { font-size: 13px; color: var(--text-primary); display: flex; align-items: center; gap: 7px; }
  .brow-label .tag { font-family: 'Barlow Condensed', sans-serif; font-size: 8.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--courage-gold); border: 1px solid rgba(212,175,55,0.4); border-radius: 2px; padding: 0 4px; }
  .brow-mid { display: grid; grid-template-columns: 54px 1fr 54px; gap: 10px; align-items: center; }
  .bval { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 600; line-height: 1; }
  .bval.ncc { text-align: right; color: var(--text-secondary); }
  .bval.opp { text-align: left; color: var(--text-secondary); }
  .bval.winner { color: var(--text-primary); font-weight: 700; font-size: 19px; }
  .bval.ncc.winner { color: var(--courage-red); }
  .bval.opp.winner { color: var(--courage-navy); }

  /* TUG OF WAR BAR */
  .tug { position: relative; height: 18px; background: var(--bg-elevated); border-radius: 4px; overflow: hidden; display: flex; }
  .tug-ncc { height: 100%; background: linear-gradient(90deg, rgba(200,16,46,0.55), var(--courage-red)); transition: width 0.4s ease; }
  .tug-opp { height: 100%; background: linear-gradient(90deg, var(--opp-bar), rgba(74,90,120,0.55)); margin-left: auto; transition: width 0.4s ease; }
  .tug-center { position: absolute; left: 50%; top: -2px; bottom: -2px; width: 2px; background: var(--text-primary); opacity: 0.35; transform: translateX(-1px); z-index: 3; }
  .tug-center::after { content: ''; position: absolute; top: -3px; left: -2px; width: 6px; height: 6px; background: var(--text-primary); opacity: 0.5; border-radius: 50%; }

  .chip { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 0; border-radius: 3px; color: #fff; text-align: center; display: block; }
  .chip.draw { color: #fff; }

  /* FACE-OFF ROWS (NCC left · metric centre · opponent right) */
  .ff-head { display: grid; grid-template-columns: 1fr 210px 1fr; align-items: center; padding: 7px 18px; background: var(--bg-surface); border-bottom: 1px solid var(--border); }
  .ff-head-team { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .ff-head-team.ncc { text-align: left; color: var(--courage-red); }
  .ff-head-team.opp { text-align: right; color: var(--courage-navy); }
  .ff-head-mid { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
  .ff-row { display: grid; grid-template-columns: 1fr 210px 1fr; align-items: center; padding: 9px 18px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .ff-row:last-child { border-bottom: none; }
  .ff-row:hover { background: var(--bg-surface); }
  .ff-left { display: flex; align-items: center; gap: 9px; }
  .ff-right { display: flex; align-items: center; gap: 9px; }
  .ff-val { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 600; color: var(--text-secondary); flex-shrink: 0; min-width: 44px; line-height: 1; }
  .ff-left .ff-val { text-align: left; }
  .ff-right .ff-val { text-align: right; }
  .ff-val.winner { font-weight: 700; font-size: 21px; }
  .ff-val.ncc.winner { color: var(--courage-red); }
  .ff-val.opp.winner { color: var(--courage-navy); }
  .ff-bar-wrap { flex: 1; height: 15px; display: flex; min-width: 0; }
  .ff-left .ff-bar-wrap { justify-content: flex-end; }
  .ff-right .ff-bar-wrap { justify-content: flex-start; }
  .ff-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .ff-bar.ncc { background: linear-gradient(90deg, rgba(200,16,46,0.4), var(--courage-red)); }
  .ff-bar.opp { background: linear-gradient(90deg, var(--opp-bar), rgba(74,90,120,0.4)); }
  .ff-center { text-align: center; padding: 0 10px; }
  .ff-metric { font-size: 12.5px; color: var(--text-primary); line-height: 1.2; }
  .ff-metric .tag { font-family: 'Barlow Condensed', sans-serif; font-size: 8.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--courage-gold); border: 1px solid rgba(212,175,55,0.4); border-radius: 2px; padding: 0 4px; margin-left: 4px; }
  .ff-res { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }
  .ff-res.win { color: var(--win); } .ff-res.loss { color: var(--loss); } .ff-res.draw { color: var(--draw); }

  /* RESULT DRIVERS (correlation) TAB */
  .corr-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px 22px; }
  .corr-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 4px; }
  .corr-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--courage-navy); }
  .corr-sub { display: flex; gap: 7px; }
  .corr-sub button { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border-strong); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
  .corr-sub button:hover { border-color: var(--courage-navy); color: var(--courage-navy); }
  .corr-sub button.active { background: var(--courage-navy); color: #fff; border-color: var(--courage-navy); }
  .corr-note { font-size: 11.5px; color: var(--text-muted); margin: 6px 0 18px; line-height: 1.55; }
  .corr-note b { color: var(--text-secondary); }
  .corr-row { display: grid; grid-template-columns: 215px 52px 52px 1fr; align-items: center; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .corr-colhead { display: grid; grid-template-columns: 215px 52px 52px 1fr; gap: 12px; padding-bottom: 5px; border-bottom: 1px solid var(--border-strong); }
  .corr-colhead div { font-family: 'Barlow Condensed', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); text-align: right; }
  .corr-rho { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; text-align: right; }
  .corr-rho.pos { color: var(--win); } .corr-rho.neg { color: var(--loss); } .corr-rho.weak { color: var(--text-muted); }
  .corr-tick { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 9px; height: 9px; background: var(--courage-navy); border: 1.5px solid #fff; border-radius: 50%; z-index: 4; box-shadow: 0 0 0 1px rgba(0,0,0,0.12); }
  .corr-legend { font-size: 10.5px; color: var(--text-muted); margin-top: 10px; display: flex; align-items: center; gap: 6px; }
  .corr-tick-key { width: 9px; height: 9px; background: var(--courage-navy); border: 1.5px solid #fff; border-radius: 50%; box-shadow: 0 0 0 1px rgba(0,0,0,0.12); display: inline-block; }
  .corr-row:last-child { border-bottom: none; }
  .corr-metric { font-size: 12.5px; color: var(--text-primary); }
  .corr-metric .ph { font-size: 10px; color: var(--text-muted); display: block; margin-top: 1px; }
  .corr-metric .tag { font-family: 'Barlow Condensed', sans-serif; font-size: 8px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--courage-gold); border: 1px solid rgba(212,175,55,0.4); border-radius: 2px; padding: 0 3px; margin-left: 3px; }
  .corr-r { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; text-align: right; }
  .corr-r.pos { color: var(--win); } .corr-r.neg { color: var(--loss); } .corr-r.weak { color: var(--text-muted); }
  .corr-bar-track { position: relative; height: 16px; background: var(--bg-surface); border-radius: 3px; }
  .corr-bar-center { position: absolute; left: 50%; top: -2px; bottom: -2px; width: 1px; background: var(--border-strong); }
  .corr-bar { position: absolute; top: 0; height: 100%; border-radius: 2px; transition: all 0.4s ease; }
  .corr-bar.pos { background: var(--win); } .corr-bar.neg { background: var(--loss); }
  .corr-scale { display: flex; justify-content: space-between; font-family: 'Barlow Condensed', sans-serif; font-size: 9px; color: var(--text-muted); letter-spacing: 0.06em; margin-top: 6px; padding: 0 0 0 0; }
  .corr-scale-row { display: grid; grid-template-columns: 215px 52px 52px 1fr; gap: 12px; margin-top: 6px; }

  /* SEASON GRID */
  .grid-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow-x: auto; }
  .sgrid { border-collapse: collapse; width: 100%; min-width: 940px; }
  .sgrid th, .sgrid td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
  .sgrid thead th { background: var(--courage-navy); color: rgba(255,255,255,0.9); font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 8px 6px; text-align: center; vertical-align: bottom; position: sticky; top: 0; }
  .sgrid thead th .gres { display: inline-block; margin-top: 3px; font-size: 9px; padding: 1px 5px; border-radius: 2px; }
  .sgrid thead th.metric-h { text-align: left; padding-left: 14px; min-width: 190px; }
  .sgrid thead th .wr { display:block; font-size:9px; color:var(--courage-gold); font-weight:600; }
  .sgrid td.metric-c { text-align: left; padding: 7px 14px; font-size: 12.5px; color: var(--text-primary); white-space: nowrap; }
  .sgrid td.cell { text-align: center; padding: 4px 5px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; cursor: default; }
  .sgrid td.cell .cv { font-weight: 700; line-height: 1; }
  .sgrid td.cell .cd { font-size: 9px; opacity: 0.75; line-height: 1.1; }
  .cell.win { background: var(--win-soft); color: #1d6b3d; } .cell.win .cv { color: var(--win); }
  .cell.draw { background: var(--draw-soft); color: #8a7a2e; } .cell.draw .cv { color: var(--draw); }
  .cell.loss { background: var(--loss-soft); color: #97362b; } .cell.loss .cv { color: var(--loss); }
  .sgrid tr.phase-divider td { background: var(--bg-surface); font-family: 'Barlow Condensed', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--courage-red); padding: 4px 14px; }
  .sgrid tr.summary td { background: var(--courage-navy); color: #fff; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
  .sgrid tr.summary td.metric-c { color: #fff; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .sgrid tr.summary td.cell { font-size: 13px; }
  .sgrid td.wr-c { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; color: var(--courage-navy); background: var(--bg-surface); }

  /* METHOD NOTE */
  .method { margin-top: 22px; background: var(--bg-card); border: 1px solid var(--border); border-left: 3px solid var(--courage-gold); border-radius: 6px; padding: 14px 18px; font-size: 12px; line-height: 1.6; color: var(--text-secondary); }
  .method b { color: var(--courage-navy); }
  .method .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; align-items: center; }
  .method .lg { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .method .dot { width: 11px; height: 11px; border-radius: 3px; }

  @media (max-width: 820px) {
    .hero { grid-template-columns: 1fr; gap: 16px; }
    .hero-left, .hero-right { border: none; padding: 0; text-align: center; }
    .hero-left { border-bottom: 1px solid var(--border); padding-bottom: 14px; }
    .brow, .battle-cols { grid-template-columns: 130px 1fr 70px; }
    .brow-mid, .battle-cols .bc-mid { grid-template-columns: 40px 1fr 40px; gap: 6px; }
  }
  @media (max-width: 768px) { .header, .match-bar { padding: 0 16px; } .main { padding: 18px 14px; } }

  /* ── PRINT VIEW (2 pages: match + result drivers) ── */
  #print-view { display: none; }
  .pv-page { background:#fff; font-family:'Barlow',Arial,sans-serif; font-size:8.5pt; box-sizing:border-box; color:#1A1A18; }
  .pv-header { display:flex; justify-content:space-between; align-items:flex-start; border-bottom:3px solid #C8102E; padding-bottom:6px; margin-bottom:10px; }
  .pv-title { font-family:'Barlow Condensed',sans-serif; font-size:16pt; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:#13264B; line-height:1.05; }
  .pv-subtitle { font-family:'Barlow Condensed',sans-serif; font-size:8pt; letter-spacing:0.1em; text-transform:uppercase; color:#7A7A74; margin-top:2px; }
  .pv-meta { text-align:right; font-size:8pt; color:#7A7A74; line-height:1.45; }
  .pv-meta .pv-score { font-family:'Barlow Condensed',sans-serif; font-size:16pt; font-weight:700; display:block; }
  .pv-meta .pv-res { font-family:'Barlow Condensed',sans-serif; font-size:8pt; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:1px 8px; border-radius:2px; color:#fff; }
  .pv-res.W{background:#2E9E5B}.pv-res.D{background:#B5A24A}.pv-res.L{background:#C0392B}
  .pv-overview { display:flex; gap:12px; align-items:center; margin-bottom:8px; }
  .pv-ov-big { font-family:'Barlow Condensed',sans-serif; font-size:24pt; font-weight:700; color:#13264B; line-height:0.9; white-space:nowrap; }

{"gw":9,"gn":10,"date":"May 24","opp":"Racing Louisville FC","home":false,"nccG":2,"oppG":1,"res":"W","b":{"bypdef":[67,36],"lbpc":[57,43],"offobv":[1.91,1.5],"sbe":[17,17],"tib":[39,46],"qc":[1,2],"bc":[1,0],"sib":[8,14],"xg":[1.23,1.29],"psxg":[1.79,0.94],"bwro":[165,175],"papress":[168.1,174.5],"pacp":[67.0,46.2],"paagg":[72.3,88.7],"defobv":[0.85,0.48]}}];

// Battle definitions — grouped by tactical phase. Add/remove here to extend the report.
const PHASES = [
  { name: 'In Possession', battles: [
    { id:'bypdef', label:'Bypassed Defenders' },
    { id:'lbpc',   label:'Line-Breaking Passes Completed' },
    { id:'offobv', label:'Offensive Action OBV', cont:true, dec:2 },
    { id:'sbe',    label:'Successful Box Entries' },
    { id:'tib',    label:'Touches in the Box' },
    { id:'qbc',    label:'Quality &amp; Big Chances', sum:['qc','bc'] },
    { id:'sib',    label:'Shots Inside the Box' },
    { id:'xg',     label:'xG', cont:true, dec:2 },
    { id:'psxg',   label:'Post-Shot xG', cont:true, dec:2 },
  ]},
  { name: 'Out of Possession', battles: [
    { id:'bwro',    label:'Ball Win Removed Opponents' },
    { id:'papress', label:'Pressures', cont:true, dec:1, tag:'PA' },
    { id:'pacp',    label:'Counterpressures', cont:true, dec:1, tag:'PA' },
    { id:'paagg',   label:'Aggressive Actions', cont:true, dec:1, tag:'PA' },
    { id:'defobv',  label:'Defensive Action OBV', cont:true, dec:2 },
  ]},
];
const ALL_BATTLES = PHASES.flatMap(p => p.battles);
const TOTAL_BATTLES = ALL_BATTLES.length;

let currentMatch = 0;
let view = 'match';

function fmtVal(v, b) {
  if (v === null || v === undefined) return '—';
  if (b.cont) return v.toFixed(b.dec);
  return v.toString();
}

// Resolve a battle's [ncc, opp] values. `sum` combines multiple metrics into one battle.
function getVals(m, b) {
  if (b.sum) return b.sum.reduce((a, id) => [a[0]+m.b[id][0], a[1]+m.b[id][1]], [0,0]);
  return m.b[b.id];
}

// Outcome of a single battle: 'win' | 'draw' | 'loss' (NCC perspective)
// Even only when the two values are identical; otherwise the higher value wins.
function battleResult(b, vals) {
  const [n, o] = vals;
  if (n === null || o === null) return 'na';
  if (n === o) return 'draw';
  return n > o ? 'win' : 'loss';
}

function tallyMatch(m) {
  let w = 0, d = 0, l = 0;
  ALL_BATTLES.forEach(b => {
    const r = battleResult(b, getVals(m, b));
    if (r === 'win') w++; else if (r === 'loss') l++; else if (r === 'draw') d++;
  });
  return { w, d, l };
}

function buildPills() {
  const el = document.getElementById('match-pills');
  el.innerHTML = MATCHES.map((m, i) => `
    <button class="match-pill ${i===currentMatch && view==='match' ? 'active':''}" onclick="selectMatch(${i})">
      <div class="mp-top"><span class="mp-res ${m.res}">${m.res}</span><span>GW${m.gw}${MATCHES.filter(x=>x.gw===m.gw).length>1 ? '·'+m.gn : ''} · ${m.date}</span></div>
      <span class="mp-opp">${m.home?'vs ':'@ '}${m.opp}</span>
    </button>`).join('');
}

function narrative(m, t) {
  const score = `${m.nccG}–${m.oppG}`;
  const battleEdge = t.w - t.l;
  const dom = t.w >= t.l + 3;
  const heavyDom = t.w >= t.l + 6;
  if (m.res === 'W') {
    if (battleEdge > 0) return `<strong>Dominant and decisive.</strong> NCC won ${t.w} of ${TOTAL_BATTLES} battles and converted that control into a ${score} win${heavyDom?' — a complete performance':''}.`;
    if (battleEdge === 0) return `<strong>Won the match, level on battles.</strong> The battle count was even (${t.w}–${t.l}) but NCC took the points ${score} — efficiency over territory.`;
    return `<strong>Smash and grab.</strong> NCC lost the battle count (${t.w} won vs ${t.l} lost) yet still won ${score} — clinical with limited control.`;
  }
  if (m.res === 'L') {
    if (battleEdge > 0) return `<strong>Won the battles, lost the war.</strong> NCC edged ${t.w} of ${TOTAL_BATTLES} battles but lost ${score}${dom?' despite controlling the underlying contest':''} — a finishing/result gap worth reviewing.`;
    if (battleEdge === 0) return `<strong>Even fight, no reward.</strong> Battles split ${t.w}–${t.l} but the match was lost ${score}.`;
    return `<strong>Out-battled and beaten.</strong> NCC lost ${t.l} of ${TOTAL_BATTLES} battles and the match ${score}.`;
  }
  // Draw
  if (battleEdge > 0) return `<strong>Outfought but not outscored.</strong> NCC won ${t.w} of ${TOTAL_BATTLES} battles${dom?' and was the better side on the metrics':''} but the match finished ${score}.`;
  if (battleEdge === 0) return `<strong>An even contest.</strong> Battles split ${t.w}–${t.l} and the match drawn ${score}.`;
  return `<strong>A point salvaged.</strong> NCC lost the battle count (${t.w}–${t.l}) but held on for a ${score} draw.`;
}

function renderMatch() {
  const m = MATCHES[currentMatch];
  const t = tallyMatch(m);
  const total = TOTAL_BATTLES;
  const wPct = (t.w/total*100), dPct = (t.d/total*100), lPct = (t.l/total*100);
  const main = document.getElementById('main');

  let html = `
  <div class="hero">
    <div class="hero-left">
      <div class="hero-wonbig">${t.w}<small>/${total}</small></div>
      <div class="hero-wonlabel">Battles Won</div>
      <div class="hero-wdl"><div class="w">${t.w} Won</div><div class="d">${t.d} Even</div><div class="l">${t.l} Lost</div></div>
    </div>
    <div class="hero-mid">
      <div class="hero-seg">
        ${t.w?`<div class="seg win" style="width:${wPct}%">${t.w}</div>`:''}
        ${t.d?`<div class="seg draw" style="width:${dPct}%">${t.d}</div>`:''}
        ${t.l?`<div class="seg loss" style="width:${lPct}%">${t.l}</div>`:''}
      </div>
      <div class="hero-narrative">${narrative(m, t)}</div>
    </div>
    <div class="hero-right">
      <div class="hero-matchup">${m.home?'vs':'@'} ${m.opp}</div>
      <div class="hero-score" style="color:var(--${m.res==='W'?'win':m.res==='L'?'loss':'draw'})">${m.nccG}–${m.oppG}</div>
      <div><span class="hero-resbadge ${m.res}">${m.res==='W'?'Win':m.res==='L'?'Loss':'Draw'}</span></div>
      <div class="hero-date">GW${m.gw} · ${m.date}, 2026 · ${m.home?'Home':'Away'}</div>
    </div>
  </div>`;

  PHASES.forEach(phase => {
    const pw = phase.battles.filter(b => battleResult(b, getVals(m, b))==='win').length;
    html += `
    <div class="phase">
      <div class="phase-head">
        <span class="phase-title">${phase.name}</span>
        <span class="phase-tally"><b>${pw}</b>/${phase.battles.length} won</span>
        <span class="phase-line"></span>
      </div>
      <div class="battle-card">
        <div class="ff-head">
          <div class="ff-head-team ncc">NC Courage</div>
          <div class="ff-head-mid">Battle</div>
          <div class="ff-head-team opp">${m.opp}</div>
        </div>`;
    phase.battles.forEach(b => {
      const [n, o] = getVals(m, b);
      const res = battleResult(b, [n, o]);
      const maxAbs = Math.max(Math.abs(n), Math.abs(o)) || 1;
      const nBarW = Math.abs(n)/maxAbs*100, oBarW = Math.abs(o)/maxAbs*100;
      const nWin = res==='win', oWin = res==='loss';
      const resTxt = res==='win'?'Won':res==='loss'?'Lost':'Even';
      html += `
        <div class="ff-row">
          <div class="ff-left">
            <div class="ff-val ncc ${nWin?'winner':''}">${fmtVal(n,b)}</div>
            <div class="ff-bar-wrap ncc"><div class="ff-bar ncc" style="width:${nBarW}%"></div></div>
          </div>
          <div class="ff-center">
            <div class="ff-metric">${b.label}${b.tag?`<span class="tag">${b.tag}</span>`:''}</div>
            <div class="ff-res ${res}">${resTxt}</div>
          </div>
          <div class="ff-right">
            <div class="ff-bar-wrap opp"><div class="ff-bar opp" style="width:${oBarW}%"></div></div>
            <div class="ff-val opp ${oWin?'winner':''}">${fmtVal(o,b)}</div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });

  html += methodNote();
  main.innerHTML = html;
}

function renderSeasonGrid() {
  const main = document.getElementById('main');
  let html = `<div class="grid-wrap"><table class="sgrid"><thead><tr>
    <th class="metric-h">Battle <span class="wr">Win rate &rarr;</span></th>`;
  MATCHES.forEach((m,i) => {
    html += `<th onclick="selectMatch(${i})" style="cursor:pointer">GW${m.gw}${MATCHES.filter(x=>x.gw===m.gw).length>1?'·'+m.gn:''}<br><span style="font-weight:400;font-size:9px;opacity:0.75">${m.home?'v':'@'} ${m.opp.split(' ')[0]}</span><br><span class="gres mp-res ${m.res}" style="color:#fff">${m.nccG}-${m.oppG}</span></th>`;
  });
  html += `<th>Win<br>Rate</th></tr></thead><tbody>`;

  PHASES.forEach(phase => {
    html += `<tr class="phase-divider"><td colspan="${MATCHES.length+2}">${phase.name}</td></tr>`;
    phase.battles.forEach(b => {
      let wins = 0, played = 0;
      let cells = '';
      MATCHES.forEach(m => {
        const [n,o] = getVals(m, b);
        const r = battleResult(b,[n,o]);
        if (r!=='na'){ played++; if(r==='win') wins++; }
        cells += `<td class="cell ${r}"><div class="cv">${r==='win'?'W':r==='loss'?'L':r==='draw'?'E':'–'}</div><div class="cd">${fmtVal(n,b)} / ${fmtVal(o,b)}</div></td>`;
      });
      const wr = played? Math.round(wins/played*100):0;
      html += `<tr><td class="metric-c">${b.label}${b.tag?` <span style="font-size:9px;color:var(--courage-gold)">[${b.tag}]</span>`:''}</td>${cells}<td class="wr-c">${wins}/${played}</td></tr>`;
    });
  });

  // Summary row
  let sumCells = '';
  MATCHES.forEach(m => { const t = tallyMatch(m); sumCells += `<td class="cell">${t.w}</td>`; });
  html += `<tr class="summary"><td class="metric-c">Battles Won (of ${TOTAL_BATTLES})</td>${sumCells}<td class="cell">—</td></tr>`;
  html += `</tbody></table></div>`;
  html += methodNote();
  main.innerHTML = html;
}

function methodNote() {
  return `<div class="method">
    <b>How a battle is scored.</b> Each metric is a head-to-head: NC Courage's value (left) vs the opponent's (right) for that match, and the higher value wins the battle. Bars are scaled to the larger of the two values. A battle is marked <b>Even</b> only when the two values are identical.
    <div class="legend">
      <div class="lg"><span class="dot" style="background:var(--win)"></span>NCC won the battle</div>
      <div class="lg"><span class="dot" style="background:var(--draw)"></span>Even (tied)</div>
      <div class="lg"><span class="dot" style="background:var(--loss)"></span>Opponent won the battle</div>
      <div class="lg"><span class="dot" style="background:var(--courage-red)"></span>NC Courage</div>
      <div class="lg"><span class="dot" style="background:var(--opp-bar)"></span>Opponent</div>
    </div>
  </div>`;
}

function selectMatch(i) {
  currentMatch = i; view = 'match';
  document.getElementById('gridBtn').classList.remove('active');
  document.getElementById('corrBtn').classList.remove('active');
  buildPills(); renderMatch();
  window.scrollTo({top:0, behavior:'smooth'});
}
function showSeasonGrid() {
  view = 'grid';
  document.getElementById('gridBtn').classList.add('active');
  document.getElementById('corrBtn').classList.remove('active');
  buildPills(); renderSeasonGrid();
}

// ── RESULT DRIVERS (correlation of battle margin with match result) ──────────
let corrSubset = 'all';
function matchGD(m) { return m.nccG - m.oppG; }
function subsetMatches(s) { return s==='home' ? MATCHES.filter(m=>m.home) : s==='away' ? MATCHES.filter(m=>!m.home) : MATCHES; }
function phaseOf(id) { const p = PHASES.find(p=>p.battles.some(b=>b.id===id)); return p ? p.name : ''; }

function pearson(xs, ys) {
  const n = xs.length;
  if (n < 3) return null;
  const mx = xs.reduce((a,b)=>a+b,0)/n, my = ys.reduce((a,b)=>a+b,0)/n;
  let num=0, dx=0, dy=0;
  for (let i=0;i<n;i++){ const a=xs[i]-mx, b=ys[i]-my; num+=a*b; dx+=a*a; dy+=b*b; }
  if (dx===0 || dy===0) return null;
  return num/Math.sqrt(dx*dy);
}
// Average-rank for ties → Spearman is Pearson on the ranks (robust to outliers)
function rankify(arr) {
  const order = arr.map((v,i)=>[v,i]).sort((a,b)=>a[0]-b[0]);
  const ranks = new Array(arr.length);
  let i=0;
  while (i<order.length) {
    let j=i; while (j+1<order.length && order[j+1][0]===order[i][0]) j++;
    const avg = (i+j)/2 + 1;
    for (let k=i;k<=j;k++) ranks[order[k][1]] = avg;
    i = j+1;
  }
  return ranks;
}
function spearman(xs, ys) { return xs.length < 3 ? null : pearson(rankify(xs), rankify(ys)); }
function marginsFor(b, ms) { return ms.map(m => { const [n,o]=getVals(m,b); return n-o; }); }

function setCorrSubset(s) { corrSubset = s; renderCorrelations(); }

function renderCorrelations() {
  const ms = subsetMatches(corrSubset);
  const gd = ms.map(matchGD);
  const rows = ALL_BATTLES.map(b => {
    const d = marginsFor(b, ms);
    return { b, r: pearson(d, gd), rho: spearman(d, gd) };
  }).filter(x => x.r !== null).sort((a,b) => Math.abs(b.r) - Math.abs(a.r));

  const subLabel = { all:'All Matches', home:'Home', away:'Away' }[corrSubset];
  let html = `<div class="corr-wrap">
    <div class="corr-head">
      <div class="corr-title">Result Drivers &mdash; ${subLabel}</div>
      <div class="corr-sub">
        <button class="${corrSubset==='all'?'active':''}" onclick="setCorrSubset('all')">All (${MATCHES.length})</button>
        <button class="${corrSubset==='home'?'active':''}" onclick="setCorrSubset('home')">Home (${subsetMatches('home').length})</button>
        <button class="${corrSubset==='away'?'active':''}" onclick="setCorrSubset('away')">Away (${subsetMatches('away').length})</button>
      </div>
    </div>
    <div class="corr-note">Correlation between each battle's <b>margin (NCC &minus; opponent)</b> and <b>goal difference</b> (NCC goals &minus; opponent goals), ranked by Pearson strength. Positive = winning that battle by more coincides with a better scoreline. <b>Pearson&nbsp;r</b> captures linear association; <b>Spearman&nbsp;&rho;</b> works on ranks and is more robust to single-game outliers — a big gap between the two flags an outlier-driven relationship. <b>Small-sample caution:</b> n = ${ms.length} matches — directional only. |value| &gt; 0.7 strong &middot; 0.4&ndash;0.7 moderate &middot; &lt; 0.4 weak.</div>
    <div class="corr-colhead"><div></div><div>Pearson r</div><div>Spearman &rho;</div><div></div></div>`;

  rows.forEach(({ b, r, rho }) => {
    const cls = Math.abs(r) < 0.4 ? 'weak' : (r>=0 ? 'pos':'neg');
    const rhoCls = rho===null ? 'weak' : (Math.abs(rho)<0.4 ? 'weak' : (rho>=0?'pos':'neg'));
    const w = Math.abs(r)*50, left = r>=0 ? 50 : 50-w;
    const tick = rho===null ? '' : `<div class="corr-tick" style="left:${50+rho*50}%"></div>`;
    html += `<div class="corr-row">
      <div class="corr-metric">${b.label}${b.tag?`<span class="tag">${b.tag}</span>`:''}<span class="ph">${phaseOf(b.id)}</span></div>
      <div class="corr-r ${cls}">${r>=0?'+':''}${r.toFixed(2)}</div>
      <div class="corr-rho ${rhoCls}">${rho===null?'—':(rho>=0?'+':'')+rho.toFixed(2)}</div>
      <div class="corr-bar-track"><div class="corr-bar-center"></div><div class="corr-bar ${r>=0?'pos':'neg'}" style="left:${left}%;width:${w}%"></div>${tick}</div>
    </div>`;
  });
  html += `<div class="corr-scale-row"><div></div><div></div><div></div><div class="corr-scale"><span>&minus;1.0</span><span>&minus;0.5</span><span>0</span><span>+0.5</span><span>+1.0</span></div></div>`;
  html += `<div class="corr-legend"><span class="corr-tick-key"></span> Marker = Spearman &rho; &nbsp;&middot;&nbsp; coloured bar = Pearson r</div>`;
  html += `</div>`;
  document.getElementById('main').innerHTML = html;
}

function showCorrelations() {
  view = 'corr';
  document.getElementById('corrBtn').classList.add('active');
  document.getElementById('gridBtn').classList.remove('active');
  buildPills(); renderCorrelations();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── PRINT: page 1 = match (+ radar), page 2 = result drivers + season grid ───
function buildRadarSVG(m) {
  const cx=310, cy=172, R=112, N=ALL_BATTLES.length;
  const SHORT={bypdef:'Byp Def',lbpc:'LB Pass',offobv:'Off OBV',sbe:'Box Ent',tib:'Box Tch',qbc:'Q+B Ch',sib:'Shots iB',xg:'xG',psxg:'PSxG',bwro:'BWR Opp',papress:'Press',pacp:'C-Press',paagg:'Agg',defobv:'Def OBV'};
  const ang=i=>(-90+i*360/N)*Math.PI/180;
  const pt=(i,f)=>[cx+R*f*Math.cos(ang(i)), cy+R*f*Math.sin(ang(i))];
  let grid='';
  [0.25,0.5,0.75,1].forEach(f=>{
    const pts=ALL_BATTLES.map((_,i)=>pt(i,f).map(v=>v.toFixed(1)).join(',')).join(' ');
    grid+=`<polygon points="${pts}" fill="none" stroke="#D8D5CF" stroke-width="${f===1?1.2:0.7}"/>`;
  });
  let spokes='', labels='';
  ALL_BATTLES.forEach((b,i)=>{
    const [ex,ey]=pt(i,1);
    spokes+=`<line x1="${cx}" y1="${cy}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="#E2DFD9" stroke-width="0.7"/>`;
    const [lx,ly]=pt(i,1.14), c=Math.cos(ang(i)), s=Math.sin(ang(i));
    const anchor=Math.abs(c)<0.3?'middle':(c>0?'start':'end');
    const dy=s<-0.3?-1:(s>0.3?9:3.5);
    labels+=`<text x="${lx.toFixed(1)}" y="${(ly+dy).toFixed(1)}" font-size="9" fill="#4A4A45" text-anchor="${anchor}" font-family="Barlow Condensed,sans-serif">${SHORT[b.id]||b.label}</text>`;
  });
  const nccPts=[], oppPts=[];
  ALL_BATTLES.forEach((b,i)=>{
    const [n,o]=getVals(m,b); const mx=Math.max(Math.abs(n),Math.abs(o))||1;
    nccPts.push(pt(i,Math.max(0,Math.abs(n)/mx))); oppPts.push(pt(i,Math.max(0,Math.abs(o)/mx)));
  });
  const poly=arr=>arr.map(p=>p.map(v=>v.toFixed(1)).join(',')).join(' ');
  return `<svg viewBox="0 0 620 350" width="100%" style="max-height:3.15in;display:block;margin:0 auto">
    ${grid}${spokes}
    <polygon points="${poly(oppPts)}" fill="rgba(19,38,75,0.16)" stroke="#13264B" stroke-width="1.6"/>
    <polygon points="${poly(nccPts)}" fill="rgba(200,16,46,0.20)" stroke="#C8102E" stroke-width="1.8"/>
    ${labels}
  </svg>`;
}

function buildPrintGrid() {
  let h = `<div class="pv-section"><div class="pv-section-title">Season Grid &mdash; battle outcomes by match (W won &middot; E even &middot; L lost)</div>
    <table class="pv-gridtable"><thead><tr><th>Battle</th>`;
  MATCHES.forEach(mm => {
    const lbl = `G${mm.gw}${MATCHES.filter(x=>x.gw===mm.gw).length>1?'.'+mm.gn:''}`;
    h += `<th>${lbl}<br><span class="pv-ghres ${mm.res}">${mm.nccG}-${mm.oppG}</span></th>`;
  });
  h += `<th>Win%</th></tr></thead><tbody>`;
  PHASES.forEach(phase => {
    h += `<tr class="pv-grid-div"><td colspan="${MATCHES.length+2}">${phase.name}</td></tr>`;
    phase.battles.forEach(b => {
      let wins=0, played=0, cells='';
      MATCHES.forEach(mm => {
        const r = battleResult(b, getVals(mm,b));
        if (r!=='na'){ played++; if(r==='win') wins++; }
        cells += `<td class="pv-cell ${r}">${r==='win'?'W':r==='loss'?'L':r==='draw'?'E':'–'}</td>`;
      });
      const wr = played ? Math.round(wins/played*100) : 0;
      h += `<tr><td>${b.label}${b.tag?`<span class="pv-tag">${b.tag}</span>`:''}</td>${cells}<td class="wr">${wr}%</td></tr>`;
    });
  });
  let sum='';
  MATCHES.forEach(mm => { sum += `<td>${tallyMatch(mm).w}</td>`; });
  h += `<tr class="pv-grid-sum"><td>Battles won (of ${TOTAL_BATTLES})</td>${sum}<td>&mdash;</td></tr>`;
  h += `</tbody></table></div>`;
  return h;
}

function openPrint() {
  const m = MATCHES[currentMatch];
  const t = tallyMatch(m);
  const total = TOTAL_BATTLES;
  const resWord = { W:'Win', D:'Draw', L:'Loss' }[m.res];

  // PAGE 1 — match
  let p1 = `<div class="pv-page">
    <div class="pv-header">
      <div>
        <div class="pv-title">NC Courage &mdash; Match Battles</div>
        <div class="pv-subtitle">vs ${m.opp} &middot; ${m.home?'Home':'Away'}</div>
      </div>
      <div class="pv-meta">
        GW${m.gw} &middot; ${m.date}, 2026<br>
        <span class="pv-score" style="color:${m.res==='W'?'#2E9E5B':m.res==='L'?'#C0392B':'#B5A24A'}">${m.nccG}&ndash;${m.oppG}</span>
        <span class="pv-res ${m.res}">${resWord}</span>
      </div>
    </div>
    <div class="pv-overview">
      <div class="pv-ov-big">${t.w}<small>/${total}</small></div>
      <div class="pv-ov-segwrap">
        <div class="pv-ov-seg">
          ${t.w?`<div class="w" style="width:${t.w/total*100}%">${t.w}</div>`:''}
          ${t.d?`<div class="d" style="width:${t.d/total*100}%">${t.d}</div>`:''}
          ${t.l?`<div class="l" style="width:${t.l/total*100}%">${t.l}</div>`:''}
        </div>
        <div class="pv-ov-wdl">Battles won: <b>${t.w}</b> &middot; Even: ${t.d} &middot; Lost: ${t.l}</div>
      </div>
    </div>
    <div class="pv-narr">${narrative(m, t)}</div>`;

  PHASES.forEach(phase => {
    const pw = phase.battles.filter(b => battleResult(b, getVals(m,b))==='win').length;
    p1 += `<div class="pv-section"><div class="pv-section-title">${phase.name} &nbsp;&middot;&nbsp; ${pw}/${phase.battles.length} won</div>
      <table class="pv-table"><thead><tr>
        <th style="width:42%">Battle</th><th class="r">NC Courage</th><th class="r">${m.opp}</th><th class="c">Result</th>
      </tr></thead><tbody>`;
    phase.battles.forEach(b => {
      const [n,o] = getVals(m,b);
      const res = battleResult(b,[n,o]);
      const resTxt = res==='win'?'Won':res==='loss'?'Lost':'Even';
      p1 += `<tr>
        <td>${b.label}${b.tag?`<span class="pv-tag">${b.tag}</span>`:''}</td>
        <td class="r pv-ncc">${fmtVal(n,b)}</td>
        <td class="r pv-opp">${fmtVal(o,b)}</td>
        <td class="c pv-rescell ${res}">${resTxt}</td>
      </tr>`;
    });
    p1 += `</tbody></table></div>`;
  });
  // Visual aid filling the lower page: radar comparison
  p1 += `<div class="pv-section"><div class="pv-section-title">Match Control &mdash; NC Courage vs ${m.opp} (each axis scaled to the higher value)</div>
      ${buildRadarSVG(m)}
      <div class="pv-radar-legend"><span><i style="background:#C8102E"></i> NC Courage</span><span><i style="background:#13264B"></i> ${m.opp}</span></div>
    </div>`;
  p1 += `<div class="pv-footer"><span class="pv-pgnum">1 / 2</span>North Carolina Courage &middot; 2026 NWSL &middot; StatsBomb / Impect Data</div></div>`;

  // PAGE 2 — result drivers (margin vs goal difference; Pearson + Spearman) + season grid
  const subs = { all: MATCHES, home: subsetMatches('home'), away: subsetMatches('away') };
  const gdBy = { all: subs.all.map(matchGD), home: subs.home.map(matchGD), away: subs.away.map(matchGD) };
  const rrows = ALL_BATTLES.map(b => ({
    b,
    r:    pearson(marginsFor(b, subs.all),  gdBy.all),
    rho:  spearman(marginsFor(b, subs.all), gdBy.all),
    home: pearson(marginsFor(b, subs.home), gdBy.home),
    away: pearson(marginsFor(b, subs.away), gdBy.away),
  })).sort((a,b) => Math.abs(b.r ?? 0) - Math.abs(a.r ?? 0));

  const rCell = v => {
    if (v === null) return `<td class="r pv-r weak">&mdash;</td>`;
    const cls = Math.abs(v) < 0.4 ? 'weak' : (v >= 0 ? 'pos' : 'neg');
    return `<td class="r pv-r ${cls}">${v>=0?'+':''}${v.toFixed(2)}</td>`;
  };
  let p2 = `<div class="pv-page">
    <div class="pv-header">
      <div>
        <div class="pv-title">NC Courage &mdash; Result Drivers</div>
        <div class="pv-subtitle">Battle margin vs goal difference</div>
      </div>
      <div class="pv-meta">2026 NWSL Season<br>${MATCHES.length} matches &middot; ${subs.home.length} home / ${subs.away.length} away</div>
    </div>
    <div class="pv-section"><div class="pv-section-title">Correlation of battle margin (NCC &minus; opp) with goal difference</div>
      <table class="pv-table"><thead><tr>
        <th style="width:34%">Battle</th><th>Phase</th>
        <th class="r">Pearson r</th><th class="r">Spearman &rho;</th><th class="r">Home r</th><th class="r">Away r</th>
      </tr></thead><tbody>`;
  rrows.forEach(({b, r, rho, home, away}) => {
    p2 += `<tr>
      <td>${b.label}${b.tag?`<span class="pv-tag">${b.tag}</span>`:''}</td>
      <td style="color:#7A7A74;font-size:6.5pt">${phaseOf(b.id)}</td>
      ${rCell(r)}${rCell(rho)}${rCell(home)}${rCell(away)}
    </tr>`;
  });
  p2 += `</tbody></table></div>
    <div class="pv-note"><b>Method.</b> Correlation of each battle's margin (NC Courage &minus; opponent) with <b>goal difference</b>, ranked by Pearson r (All matches). <b>Spearman &rho;</b> is the rank-based, outlier-robust check; <b>Home / Away</b> show Pearson within each venue. <b>Small-sample caution:</b> ${MATCHES.length} matches (${subs.home.length} home, ${subs.away.length} away) &mdash; directional only; |value| &gt; 0.7 strong, 0.4&ndash;0.7 moderate, &lt; 0.4 weak (greyed).</div>
    ${buildPrintGrid()}
    <div class="pv-footer"><span class="pv-pgnum">2 / 2</span>North Carolina Courage &middot; 2026 NWSL &middot; Printed ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
  </div>`;

  document.getElementById('print-view').innerHTML = p1 + p2;
  window.print();
}

buildPills();
renderMatch();
</script>
